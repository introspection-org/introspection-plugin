name: Validate plugin

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  conventional-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          pattern='^(feat|fix|deps|docs|refactor|perf|test|build|ci|chore|style|revert)(\([a-z0-9._/-]+\))?(!)?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits: <type>(optional-scope)!: <summary>"
            exit 1
          fi

  discover:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [codex, claude-code]
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
      - name: Validate ${{ matrix.target }} discovery
        run: npx --yes plugins@1.3.4 discover . --target "${{ matrix.target }}"
